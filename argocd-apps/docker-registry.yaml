apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docker-registry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Wave 2: Infrastructure (registry for app images)
spec:
  project: default

  source:
    repoURL: https://github.com/fersan1985/k8s-apps.git
    targetRevision: HEAD
    path: apps/docker-registry/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: docker-registry

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
