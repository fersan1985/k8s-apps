# App of Apps Pattern
# This is the ONLY Application you need to apply manually
# It will create all other Applications automatically

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # Deploy first
spec:
  project: default

  source:
    repoURL: https://github.com/fersan1985/k8s-apps.git
    targetRevision: HEAD
    path: argocd-apps
    directory:
      recurse: false  # Only process files in argocd-apps/, not subdirectories
      exclude: |
        root-app.yaml  # Don't create Application for itself (avoid recursion)

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
