apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meli-monitor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"  # Wave 3: Apps (depends on docker-registry)
spec:
  project: default

  source:
    repoURL: https://github.com/fersan1985/k8s-apps.git
    targetRevision: HEAD
    path: apps/meli_monitor/helm
    helm:
      releaseName: meli-monitor

  destination:
    server: https://kubernetes.default.svc
    namespace: meli-monitor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
