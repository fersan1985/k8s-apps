apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.14.3
    helm:
      valuesObject:
        # Provider: AWS Route53
        provider: aws

        # AWS Configuration
        aws:
          region: us-east-1  # Ajusta según tu región de Route53
          zoneType: public

        # Dominio a gestionar
        domainFilters:
          - sanchezcloud.com

        # Policy: solo crear registros, no modificar ni eliminar
        # Cambia a "sync" cuando estés seguro que funciona correctamente
        policy: upsert-only

        # Intervalo de sincronización
        interval: 1m

        # Log level
        logLevel: info

        # Recursos
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        # Variables de entorno para AWS credentials
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: external-dns-aws
                key: aws_access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-aws
                key: aws_secret_access_key

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
