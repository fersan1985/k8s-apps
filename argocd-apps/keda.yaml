apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.13.1
    helm:
      releaseName: keda
      valueFiles:
        - $values/platform/keda/values.yaml

  sources:
    - repoURL: https://kedacore.github.io/charts
      chart: keda
      targetRevision: 2.13.1
    - repoURL: https://github.com/fersan1985/k8s-apps.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: keda

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
