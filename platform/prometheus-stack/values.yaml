# kube-prometheus-stack values for lab testing
# This configuration is designed to test kubemixing customizations for Quicknode

defaultRules:
  create: true
  rules:
    # Enable all kubernetes-mixin rules by default
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Grafana configuration
grafana:
  enabled: true
  adminPassword: admin  # Change this in production!

  # Persistence for dashboards
  persistence:
    enabled: true
    storageClassName: rook-ceph-block
    size: 5Gi

  # Default dashboards from kubernetes-mixin
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: America/Argentina/Buenos_Aires

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.lab.local
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"

  # Datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-stack-kube-prom-prometheus:9090
        access: proxy
        isDefault: true

# Prometheus configuration
prometheus:
  enabled: true

  prometheusSpec:
    # Resource requests/limits for lab
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Retention
    retention: 7d
    retentionSize: "10GB"

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Service monitors - discover all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Additional scrape configs for chain namespaces
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods-chains'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - chain-ethereum
                - chain-polygon
                - chain-arbitrum
                - chain-optimism
                - chain-base
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          # Add chain label from namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            regex: chain-(.+)
            target_label: chain
            replacement: $1

# Alert manager configuration
alertmanager:
  enabled: true

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m

    # Route configuration to handle chain alerts separately
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        # Separate route for chain namespaces - these won't trigger kubernetes-mixin alerts
        - match_re:
            namespace: ^chain-.*
          receiver: 'chain-alerts'
          continue: false

        # Default kubernetes alerts
        - match:
            severity: critical
          receiver: 'critical'

        - match:
            severity: warning
          receiver: 'warning'

    receivers:
      - name: 'default'
        # Add your notification config here (slack, email, etc)

      - name: 'chain-alerts'
        # Separate receiver for chain alerts
        # Add your notification config here

      - name: 'critical'
        # Critical alerts

      - name: 'warning'
        # Warning alerts

# Node exporter
prometheus-node-exporter:
  enabled: true

# Kube state metrics
kube-state-metrics:
  enabled: true

# Disable components not needed in lab
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false
