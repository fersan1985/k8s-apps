---
# Ingress para pihole con Let's Encrypt SSL + ExternalDNS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole-ingress
  namespace: default
  annotations:
    # Sync wave - después de ClusterIssuer y LoadBalancer
    argocd.argoproj.io/sync-wave: "5"

    # Cert-Manager: Usa Let's Encrypt Production
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ExternalDNS: Crea registro DNS automáticamente en Route53
    external-dns.alpha.kubernetes.io/hostname: pihole.cloudsanchez.com

    # Nginx Ingress - Configuración para pihole
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - pihole.cloudsanchez.com
      secretName: pihole-cloudsanchez-tls # Cert-Manager creará este certificado

  rules:
    - host: pihole.cloudsanchez.com
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: pihole-external
                port:
                  number: 80
