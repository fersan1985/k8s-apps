---
# Ingress para ArgoCD con Let's Encrypt + ExternalDNS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Sync wave - después de ClusterIssuer y LoadBalancer
    argocd.argoproj.io/sync-wave: "5"

    # Cert-Manager: Usa Let's Encrypt Production
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Para testing inicial, usa: letsencrypt-staging

    # ExternalDNS: Crea registro DNS automáticamente en Route53
    external-dns.alpha.kubernetes.io/hostname: argocd.cloudsanchez.com

    # Nginx Ingress
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - argocd.cloudsanchez.com
    secretName: argocd-cloudsanchez-tls  # Cert-Manager creará este certificado

  rules:
  - host: argocd.cloudsanchez.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
