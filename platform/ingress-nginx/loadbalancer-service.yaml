---
# Service LoadBalancer para exponer Ingress Controller de RKE2
# MetalLB asignará una IP del pool (192.168.0.50-60)
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-loadbalancer
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Opcional: Forzar una IP específica del pool
    # metallb.universe.tf/loadBalancerIPs: 192.168.0.50
spec:
  type: LoadBalancer
  # Selector para los pods del DaemonSet de RKE2
  selector:
    app.kubernetes.io/name: rke2-ingress-nginx
    app.kubernetes.io/component: controller
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
  # Opcional: Preservar IP del cliente
  externalTrafficPolicy: Local
