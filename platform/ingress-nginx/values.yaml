# Ingress Nginx Controller Values for Homelab
# Repo: https://github.com/kubernetes/ingress-nginx

controller:
  # Service configuration
  service:
    type: NodePort  # Cambia a LoadBalancer si tienes MetalLB
    nodePorts:
      http: 30080
      https: 30443
    # Si usas LoadBalancer, descomentar:
    # loadBalancerIP: "192.168.0.50"

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Metrics (para Prometheus)
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: ingress-nginx

  # Configuración adicional
  config:
    # Tamaño máximo de body para uploads (0 = sin límite)
    proxy-body-size: "100m"
    # Timeouts
    proxy-connect-timeout: "60"
    proxy-send-timeout: "60"
    proxy-read-timeout: "60"
    # SSL
    ssl-protocols: "TLSv1.2 TLSv1.3"
    ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

  # Affinity (opcional: para distribuir en workers)
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - ingress-nginx
          topologyKey: kubernetes.io/hostname

# Default backend (opcional, página 404 personalizada)
defaultBackend:
  enabled: false
