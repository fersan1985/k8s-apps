---
# MetalLB IP Address Pool
# Define el rango de IPs que MetalLB puede asignar
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Ajusta este rango según tu red local
  # Asegúrate que estas IPs no estén en uso por DHCP
  addresses:
  - 192.168.0.50-192.168.0.60
---
# L2 Advertisement - Hace que MetalLB responda ARP requests
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ipAddressPools:
  - homelab-pool
